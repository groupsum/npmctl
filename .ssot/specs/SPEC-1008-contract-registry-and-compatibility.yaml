summary: "npmctl SHALL register each contract kind with independent current, readable, and writable schema versions. Every contract document SHALL carry apiVersion, kind, schemaVersion, and metadata. Unknown future versions SHALL fail closed. Deprecation warnings and strict compatibility failures SHALL be machine-readable."
