body: |-
  Canonical PlanArtifact, NpmctlMigration, LiveStateSnapshot, and ApplyReport identities SHALL support signatures containing algorithm, key identifier, signer identity, and signing time. Verification SHALL occur before privileged use. Trust roots, unsigned-artifact policy, rotation, revocation, and invalid-signature behavior SHALL be explicit and fail closed.
