summary: "Migration execution SHALL acquire a scope-specific lease before mutation. Every external operation SHALL have a stable idempotency key and optional provider request identifier. Lost responses SHALL be reconciled through provider readback before retry. Lease expiry, takeover, checkpoint durability, and duplicate invocation SHALL have deterministic fail-closed behavior."
