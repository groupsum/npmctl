summary: "Decision: certificate issuance and rotation are higher-risk mutations than proxy-host ownership adoption or proxy-host drift repair. During outage or repair workflows, npmctl shall default to conservative certificate behavior, prefer compatible certificate reuse, allow metadata-only adoption, and require explicit operator intent for certificate creation or rotation."
