body: |-
  Context: plans, snapshots, ledgers, and reports can expose credentials or infrastructure details. Decision: npmctl SHALL define field-level exclusion and redaction, data minimization, retention, and disposal rules for every artifact kind. Secret values SHALL never participate in user-visible output or persisted evidence unless an explicit protected contract requires them.
