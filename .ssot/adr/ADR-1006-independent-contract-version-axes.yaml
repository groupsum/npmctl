summary: "Context: package releases, document schemas, provider capabilities, target API profiles, and execution artifacts evolve independently. Decision: npmctl SHALL maintain explicit supported read and write ranges for each contract kind and SHALL NOT infer contract compatibility from package SemVer. Consequences: future contracts fail closed, deprecations are machine-readable, and version output reports every compatibility axis."
