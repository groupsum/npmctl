status_notes: []
references: []
body: |-
  Decision: dns_records are reconciled by npmctl plan/apply as a first-class surface instead of being limited to validation and diagnostics. Consequences: planning must include DNS operations, apply must execute provider writes or fail closed, and reports must distinguish DNS mutations from Nginx Proxy Manager mutations.
