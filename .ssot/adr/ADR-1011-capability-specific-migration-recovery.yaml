summary: "Context: not every external mutation is reversible, especially complete-zone DNS writes. Decision: each migration SHALL declare reversibility. Rollback is available only with a verified inverse; otherwise npmctl SHALL capture a prechange snapshot and use forward repair with post-write verification."
