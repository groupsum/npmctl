summary: "Decision: DNS deletes are allowed only for records proven to be npmctl-owned or explicitly managed for the requested owner. Consequences: unmanaged provider records in the same zone are preserved, destructive pruning is owner-scoped, and ambiguous ownership blocks deletion until adoption or explicit management is available."
