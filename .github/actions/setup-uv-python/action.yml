---
name: Setup uv and Python
description: Install Python and uv, then sync the workspace.
inputs:
  python-version:
    description: Python version
    required: false
    default: "3.13"
runs:
  using: composite
  steps:
    - uses: cobycloud/actions/actions/python-uv@main
      with:
        python-version: ${{ inputs.python-version }}
        install-command: uv sync --all-packages --dev
        run-command: ""
