---
name: npmctl release build
description: Build npmctl package wheels and source distributions.
runs:
  using: composite
  steps:
    - shell: bash
      run: |
        uv build --package npmctl
        uv build --package npmctl-namecheap
    - shell: bash
      run: |
        uv run python -m npmctl compliance artifacts --output-dir .tmp/compliance --source-dir . --dist-dir dist
        uv run python -m npmctl compliance gate --artifact-dir .tmp/compliance
    - uses: actions/upload-artifact@v4
      with:
        name: npmctl-dist
        path: dist/*
    - uses: actions/upload-artifact@v4
      with:
        name: npmctl-compliance
        path: .tmp/compliance/*
