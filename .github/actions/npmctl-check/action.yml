---
name: npmctl quality check
description: Run linting, formatting, YAML linting, and pytest.
runs:
  using: composite
  steps:
    - shell: bash
      run: uv run ruff check .
    - shell: bash
      run: uv run ruff format --check .
    - shell: bash
      run: uv run yamllint .
    - shell: bash
      run: uv run python -m compileall -q packages/npmctl/src
    - shell: bash
      run: uv run pytest
    - shell: bash
      run: |
        uv run npmctl --output json contract list > .tmp-contract-matrix.json
        uv run npmctl migrate examples/desired-state --check
    - shell: bash
      run: |
        uv run python -m npmctl compliance artifacts --output-dir .tmp/compliance --source-dir .
        uv run python -m npmctl compliance gate --artifact-dir .tmp/compliance
