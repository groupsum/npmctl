---
name: npmctl schema gate
description: Validate committed schemas and desired-state examples.
runs:
  using: composite
  steps:
    - shell: bash
      run: uv run python scripts/validate_schemas.py
    - shell: bash
      run: |
        for file in examples/desired-state/*.yaml; do
          uv run npmctl validate "$file"
        done
    - shell: bash
      run: uv run npmctl migrate examples/desired-state --check
