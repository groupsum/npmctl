---
name: Docs and SSOT

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: npmctl-docs-ssot-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  docs-ssot:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on:
      group: shortlived
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-uv-python
      - uses: ./.github/actions/npmctl-ssot-gate
