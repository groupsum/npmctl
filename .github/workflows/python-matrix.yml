---
name: Python Matrix

on:
  push:
    branches: [master, "v*"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: npmctl-python-matrix-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  pytest:
    name: Python ${{ matrix.python-version }}
    runs-on:
      group: shortlived
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-uv-python
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: false
      - run: uv run python -m compileall -q packages/npmctl/src
      - run: uv run python -m compileall -q packages/npmctl-cloudflare/src
      - run: uv run python -m compileall -q packages/npmctl-digitalocean/src
      - run: uv run python -m compileall -q packages/npmctl-godaddy/src
      - run: uv run python -m compileall -q packages/npmctl-namecheap/src
      - run: uv run python -m compileall -q packages/npmctl-route53/src
      - run: >
          uv run pytest
          packages/npmctl/tests
          packages/npmctl-cloudflare/tests
          packages/npmctl-digitalocean/tests
          packages/npmctl-godaddy/tests
          packages/npmctl-namecheap/tests
          packages/npmctl-route53/tests
