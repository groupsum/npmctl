---
name: Live NPM Gate

on:
  workflow_dispatch:
  schedule:
    - cron: "23 4 * * *"

concurrency:
  group: npmctl-live-npm-gate-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  actions: read

jobs:
  e2e:
    runs-on:
      group: shortlived
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-uv-python
      - uses: ./.github/actions/npmctl-real-npm-e2e
