---
name: CI

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: npmctl-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    runs-on:
      group: shortlived
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-uv-python
      - uses: ./.github/actions/npmctl-check
      - uses: ./.github/actions/npmctl-schema-gate
