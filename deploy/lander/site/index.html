        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
      }

      body {
        align-items: center;

        letter-spacing: 0;
        line-height: 0.95;

  <body>
