[project]
name = "npmctl"
version = "0.3.9"
description = "Owner-scoped plan/apply/adopt controller for Nginx Proxy Manager resources."
readme = "README.md"
requires-python = ">=3.10,<3.15"
license = "Apache-2.0"
license-files = ["LICENSE"]
authors = [{ name = "Jacob Stewart", email = "jacob@swarmauri.com" }]
keywords = [
  "nginx-proxy-manager",
  "npm",
  "reverse-proxy",
  "gitops",
  "desired-state",
  "infrastructure-as-code",
  "controller",
  "plan-apply",
  "owner-scoped",
  "dns",
  "dns-management",
  "dns-provider",
  "dns-records",
  "ssl-certificates",
  "access-lists",
  "a-record",
  "aaaa-record",
  "cname-record",
  "txt-record",
  "mx-record",
  "srv-record",
  "caa-record",
]
classifiers = [
  "Development Status :: 4 - Beta",
  "Environment :: Console",
  "Intended Audience :: Developers",
  "Intended Audience :: Information Technology",
  "Intended Audience :: System Administrators",
  "Operating System :: OS Independent",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3 :: Only",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Programming Language :: Python :: 3.14",
  "Topic :: Internet :: Name Service (DNS)",
  "Topic :: Internet :: WWW/HTTP :: HTTP Servers",
  "Topic :: Security :: Cryptography",
  "Topic :: System :: Networking",
  "Topic :: System :: Systems Administration",
  "Typing :: Typed",
]
dependencies = [
  "PyYAML>=6.0.2",
  "requests>=2.32.0",
  "tomli>=2.0.1; python_version < '3.11'",
]

[project.urls]
Homepage = "https://github.com/groupsum/npmctl"
Documentation = "https://github.com/groupsum/npmctl/tree/master/docs"
Issues = "https://github.com/groupsum/npmctl/issues"
Repository = "https://github.com/groupsum/npmctl"

[project.scripts]
npmctl = "npmctl.cli:main"

[build-system]
requires = ["uv-build>=0.11.8,<0.12"]
build-backend = "uv_build"
