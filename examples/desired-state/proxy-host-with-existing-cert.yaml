---
apiVersion: npmctl.com/v1
kind: DesiredState
schemaVersion: 3
metadata:
  name: workload-a-desired-state
  owner: workload-a
spec:
  proxyHosts:
    - domain_names:
        - cert-id.example.com
      forward_host: app
      forward_port: 3000
      certificate_id: 1
      ssl_forced: 1
      meta:
        managed_by: npmctl
        owner: workload-a
        resource_id: proxy.cert-id
  certificates: []
  accessLists: []
  redirectionHosts: []
  deadHosts: []
  streams: []
  users: []
  settings: []
  dnsRecords: []
  pluginResources: []
  externalCertificates: []
